<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rezervační aplikace</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/reservation/css/styles.css">
    <link rel="stylesheet" href="/reservation/css/buttons.css">
    <link rel="stylesheet" href="/reservation/css/inner.css">
    <style>
        html, body {
            overflow-x: hidden;
            overflow-y: auto;
            height: auto;
            min-height: 100vh;
        }
        @media (max-width: 700px) {
            .custom-alert {
                min-width: 90vw !important;
                width: 90vw !important;
                left: 5vw !important;
                padding: 10px !important;
                font-size: 1em;
                max-height: 90vh;
                overflow-y: auto;
            }
        }
        @media (max-width: 500px) {
            .custom-alert {
                min-width: 98vw !important;
                width: 98vw !important;
                left: 1vw !important;
                padding: 2px !important;
                font-size: 0.9em;
                max-height: 98vh;
                overflow-y: auto;
            }
        }
    </style>
</head>
<body>
  <header class="header" id="header">
    <h1 class="title">Rezervace</h1>
  </header>

  <!-- Hotbar under header: date / time / attribute filters -->
  <div class="hotbar" id="hotbar">
    <div class="hotbar-filters" id="hotbar-filters">
      <div class="hotbar-filter-field">
        <label for="reservation-date-input">Datum</label>
        <input type="date" id="reservation-date-input" disabled>
      </div>
      <div class="hotbar-filter-field">
        <label for="reservation-time-select">Čas</label>
        <select id="reservation-time-select" disabled>
          <option value="">Vyberte čas</option>
        </select>
      </div>
      <div class="hotbar-filter-field hotbar-attrs-field">
        <label>Vlastnosti</label>
        <div class="filter-checkboxes" id="filter-checkboxes">
          <p class="no-attributes-msg">Žádné vlastnosti nejsou k dispozici</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Reservation results panel, shown under the hotbar -->
  <div class="reservation-results-panel" id="reservation-results-panel">
    <h3 class="reservation-results-title">Dostupné stoly</h3>
    <div class="filter-results" id="filter-results">
      <p class="no-tables-msg">Načítání…</p>
    </div>
  </div>

  <!-- Reservation confirmation modal (duration + name) -->
  <div class="inn-modal-overlay" id="reservationModal">
    <div class="inn-modal-box">
      <h3 id="reservationModalTitle">Zarezervovat stůl</h3>
      <div class="inn-field-group">
        <label for="reservation-duration-select">Délka rezervace</label>
        <select id="reservation-duration-select"></select>
      </div>
      <div class="inn-field-group">
        <label for="reservation-name-input">Vaše jméno</label>
        <input type="text" id="reservation-name-input" placeholder="Jméno a příjmení">
      </div>
      <p style="font-size:0.8em; color:var(--muted, #777); margin:0;">Ověření přes SMS bude přidáno později.</p>
      <div class="inn-modal-actions">
        <button class="inn-btn" id="reservationModalCancelBtn">Zrušit</button>
        <button class="inn-btn primary" id="reservationModalConfirmBtn">Potvrdit rezervaci</button>
      </div>
    </div>
  </div>

  <div class="inn-toast" id="reservationToast"></div>

  <script>
      // Configuration for API URL - can be set before loading the app
      window.API_BASE_URL = window.API_BASE_URL || `http://${window.location.hostname}:3000`;
  </script>
  <script src="/reservation/config.js"></script>
  <script src="/reservation/js/renderer.js"></script>
</body>
</html>
